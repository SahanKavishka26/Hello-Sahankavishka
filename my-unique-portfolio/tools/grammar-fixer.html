<div class="max-w-4xl mx-auto p-8 bg-white/10 dark:bg-gray-900/60 rounded-3xl border border-red-500/20 backdrop-blur-xl">
    <h2 class="text-2xl font-bold mb-6 flex items-center gap-2"><i data-lucide="check-circle" class="text-red-500"></i> Grammar Fixer (AI Beta)</h2>
    <textarea id="grammarInput" rows="6" class="w-full p-6 rounded-2xl bg-black/20 border border-gray-700 outline-none focus:border-red-500 transition mb-6" placeholder="Paste your English text here..."></textarea>
    <div class="flex flex-col md:flex-row gap-4">
        <button onclick="fixGrammar()" class="flex-1 bg-red-600 p-4 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-red-700"><i data-lucide="zap" class="w-5 h-5"></i> Check Grammar</button>
        <button onclick="clearText()" class="px-8 py-4 border border-gray-700 rounded-xl hover:bg-white/5">Clear</button>
    </div>
    <div id="grammarOutput" class="mt-8 p-6 rounded-2xl bg-green-500/5 border border-green-500/20 hidden">
        <p class="text-xs font-bold text-green-500 uppercase mb-2 tracking-widest">Suggested Fix:</p>
        <p id="fixedText" class="text-lg italic opacity-90"></p>
    </div>
</div>

<script>
function fixGrammar() {
    const input = document.getElementById('grammarInput').value;
    if(!input) return alert("Please enter some text.");
    
    // Simulating AI check (In reality, you'd call an API here)
    document.getElementById('grammarOutput').classList.remove('hidden');
    document.getElementById('fixedText').innerText = "Analyzing text... [This is where AI would fix 'I is a developer' to 'I am a developer'].";
}
function clearText() { 
    document.getElementById('grammarInput').value = ""; 
    document.getElementById('grammarOutput').classList.add('hidden');
}
</script>
